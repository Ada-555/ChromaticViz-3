<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic — Color Music Visualizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bass: #ff0066;
            --mid: #00ffaa;
            --treble: #6600ff;
            --bg: #050508;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        
        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .start-title {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--bass), var(--mid), var(--treble));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShift 10s linear infinite;
            background-size: 300% 100%;
        }
        
        @keyframes titleShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        .start-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.3em;
            margin-bottom: 50px;
            text-transform: uppercase;
        }
        
        .start-btn {
            padding: 20px 60px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .start-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--mid);
            box-shadow: 0 0 30px rgba(0,255,170,0.3);
        }
        
        .start-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        
        /* Canvas */
        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        
        /* UI Overlay */
        .ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .ui.visible {
            opacity: 1;
        }
        
        .ui-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .ui-label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        
        .ui-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .ui-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.05s;
        }
        
        .bass-fill { background: var(--bass); box-shadow: 0 0 10px var(--bass); }
        .mid-fill { background: var(--mid); box-shadow: 0 0 10px var(--mid); }
        .treble-fill { background: var(--treble); box-shadow: 0 0 10px var(--treble); }
        
        /* Theme Selector */
        .theme-selector {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .theme-selector.visible {
            opacity: 1;
        }
        
        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .theme-btn:hover {
            transform: scale(1.2);
        }
        
        .theme-btn.active {
            border-color: #fff;
        }
        
        .theme-cosmic { background: linear-gradient(135deg, #ff0066, #6600ff, #00ffaa); }
        .theme-fire { background: linear-gradient(135deg, #ff4400, #ff0066, #ffaa00); }
        .theme-ocean { background: linear-gradient(135deg, #0066ff, #00ffaa, #00aaff); }
        .theme-neon { background: linear-gradient(135deg, #ff00ff, #00ffff, #ff00aa); }
        .theme-gold { background: linear-gradient(135deg, #ffd700, #ff6600, #ff0066); }
        
        /* Visualizer selector */
        .viz-selector {
            position: fixed;
            top: 30px;
            left: 30px;
            display: flex;
            gap: 10px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .viz-selector.visible {
            opacity: 1;
        }
        
        .viz-btn {
            padding: 8px 16px;
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .viz-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .viz-btn.active {
            background: rgba(255,255,255,0.15);
            border-color: var(--mid);
            color: var(--mid);
        }
        
        /* Error message */
        .error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--bass);
            font-size: 1.2rem;
            display: none;
        }
        
        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1 class="start-title">CHROMATIC</h1>
        <p class="start-subtitle">Color Music Visualizer</p>
        <button class="start-btn" id="startBtn">Connect Microphone</button>
        <p class="start-note">Microphone access required for audio visualization</p>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div class="ui" id="ui">
        <div class="ui-item">
            <span class="ui-label">Bass</span>
            <div class="ui-bar"><div class="ui-fill bass-fill" id="bassBar" style="width: 0%"></div></div>
        </div>
        <div class="ui-item">
            <span class="ui-label">Mid</span>
            <div class="ui-bar"><div class="ui-fill mid-fill" id="midBar" style="width: 0%"></div></div>
        </div>
        <div class="ui-item">
            <span class="ui-label">Treble</span>
            <div class="ui-bar"><div class="ui-fill treble-fill" id="trebleBar" style="width: 0%"></div></div>
        </div>
    </div>
    
    <div class="theme-selector" id="themeSelector">
        <button class="theme-btn theme-cosmic active" data-theme="cosmic" title="Cosmic"></button>
        <button class="theme-btn theme-fire" data-theme="fire" title="Fire"></button>
        <button class="theme-btn theme-ocean" data-theme="ocean" title="Ocean"></button>
        <button class="theme-btn theme-neon" data-theme="neon" title="Neon"></button>
        <button class="theme-btn theme-gold" data-theme="gold" title="Gold"></button>
    </div>
    
    <div class="viz-selector" id="vizSelector">
        <button class="viz-btn active" data-viz="particles">Particles</button>
        <button class="viz-btn" data-viz="waves">Waves</button>
        <button class="viz-btn" data-viz="rings">Rings</button>
    </div>
    
    <div class="error-msg" id="errorMsg">
        Microphone access denied.<br>Please allow microphone access and refresh.
    </div>

    <script>
        // Audio Analysis
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let frequencyData = null;
        
        // Visualization state
        let particles = [];
        let currentViz = 'particles';
        let currentTheme = 'cosmic';
        
        // Theme colors
        const themes = {
            cosmic: { bass: '#ff0066', mid: '#00ffaa', treble: '#6600ff' },
            fire: { bass: '#ff4400', mid: '#ff0066', treble: '#ffaa00' },
            ocean: { bass: '#0066ff', mid: '#00ffaa', treble: '#00aaff' },
            neon: { bass: '#ff00ff', mid: '#00ffff', treble: '#ff00aa' },
            gold: { bass: '#ffd700', mid: '#ff6600', treble: '#ff0066' }
        };
        
        // Elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const ui = document.getElementById('ui');
        const themeSelector = document.getElementById('themeSelector');
        const vizSelector = document.getElementById('vizSelector');
        const errorMsg = document.getElementById('errorMsg');
        const bassBar = document.getElementById('bassBar');
        const midBar = document.getElementById('midBar');
        const trebleBar = document.getElementById('trebleBar');
        
        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }
            
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // Initialize audio
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                
                startScreen.classList.add('hidden');
                ui.classList.add('visible');
                themeSelector.classList.add('visible');
                vizSelector.classList.add('visible');
                
                animate();
            } catch (err) {
                console.error('Audio init error:', err);
                errorMsg.classList.add('visible');
            }
        }
        
        // Get frequency bands
        function getFrequencyBands() {
            analyser.getByteFrequencyData(dataArray);
            
            // Split into bands
            const len = dataArray.length;
            const bassEnd = Math.floor(len * 0.1);
            const midEnd = Math.floor(len * 0.5);
            
            let bass = 0, mid = 0, treble = 0;
            
            for (let i = 0; i < bassEnd; i++) bass += dataArray[i];
            for (let i = bassEnd; i < midEnd; i++) mid += dataArray[i];
            for (let i = midEnd; i < len; i++) treble += dataArray[i];
            
            bass = bass / bassEnd / 255;
            mid = mid / (midEnd - bassEnd) / 255;
            treble = treble / (len - midEnd) / 255;
            
            return { bass, mid, treble };
        }
        
        // Theme colors helper
        function getThemeColors() {
            return themes[currentTheme];
        }
        
        // Particle visualization
        function drawParticles(bands) {
            const colors = getThemeColors();
            
            // Spawn new particles based on intensity
            const spawnCount = Math.floor(bands.bass * 30);
            for (let i = 0; i < spawnCount; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const colorChoice = Math.random();
                let color;
                if (colorChoice < 0.33) color = colors.bass;
                else if (colorChoice < 0.66) color = colors.mid;
                else color = colors.treble;
                
                particles.push(new Particle(x, y, color));
            }
            
            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Limit particle count
            if (particles.length > 500) {
                particles = particles.slice(-500);
            }
        }
        
        // Wave visualization
        function drawWaves(bands) {
            const colors = getThemeColors();
            const time = Date.now() * 0.001;
            
            // Bass wave
            ctx.beginPath();
            ctx.strokeStyle = colors.bass;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = colors.bass;
            
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height / 2 + 
                    Math.sin(x * 0.01 + time * 2) * 50 * bands.bass +
                    Math.sin(x * 0.02 + time * 3) * 30 * bands.mid;
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Mid wave
            ctx.beginPath();
            ctx.strokeStyle = colors.mid;
            ctx.lineWidth = 2;
            ctx.shadowColor = colors.mid;
            
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height / 3 + 
                    Math.sin(x * 0.015 + time * 2.5) * 40 * bands.mid +
                    Math.sin(x * 0.03 + time * 4) * 20 * bands.treble;
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Treble wave
            ctx.beginPath();
            ctx.strokeStyle = colors.treble;
            ctx.lineWidth = 1;
            ctx.shadowColor = colors.treble;
            
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height * 2 / 3 + 
                    Math.sin(x * 0.02 + time * 3) * 35 * bands.treble +
                    Math.sin(x * 0.04 + time * 5) * 15 * bands.bass;
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
        
        // Ring visualization
        function drawRings(bands) {
            const colors = getThemeColors();
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const time = Date.now() * 0.001;
            
            // Pulsing rings from center
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.45;
            
            // Bass ring
            const bassRadius = maxRadius * 0.3 + bands.bass * maxRadius * 0.5;
            ctx.beginPath();
            ctx.strokeStyle = colors.bass;
            ctx.lineWidth = 4 + bands.bass * 10;
            ctx.shadowBlur = 30;
            ctx.shadowColor = colors.bass;
            ctx.arc(cx, cy, bassRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Mid rings
            for (let i = 0; i < 3; i++) {
                const offset = (time * (1 + i * 0.5)) % 1;
                const radius = bassRadius + offset * maxRadius * 0.3;
                const alpha = 1 - offset;
                
                ctx.beginPath();
                ctx.strokeStyle = colors.mid;
                ctx.globalAlpha = alpha * 0.5;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = colors.mid;
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Treble sparkles
            ctx.globalAlpha = 1;
            for (let i = 0; i < Math.floor(bands.treble * 20); i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = bassRadius + Math.random() * maxRadius * 0.4;
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist;
                
                ctx.beginPath();
                ctx.fillStyle = colors.treble;
                ctx.shadowBlur = 20;
                ctx.shadowColor = colors.treble;
                ctx.arc(x, y, 2 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
        }
        
        // Main animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Fade effect
            ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (!analyser) return;
            
            const bands = getFrequencyBands();
            
            // Update UI bars
            bassBar.style.width = (bands.bass * 100) + '%';
            midBar.style.width = (bands.mid * 100) + '%';
            trebleBar.style.width = (bands.treble * 100) + '%';
            
            // Draw current visualization
            switch (currentViz) {
                case 'particles':
                    drawParticles(bands);
                    break;
                case 'waves':
                    drawWaves(bands);
                    break;
                case 'rings':
                    drawRings(bands);
                    break;
            }
        }
        
        // Event listeners
        startBtn.addEventListener('click', initAudio);
        
        // Theme buttons
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTheme = btn.dataset.theme;
            });
        });
        
        // Viz buttons
        document.querySelectorAll('.viz-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.viz-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentViz = btn.dataset.viz;
            });
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') {
                document.querySelector('[data-viz="particles"]').click();
            } else if (e.key === '2') {
                document.querySelector('[data-viz="waves"]').click();
            } else if (e.key === '3') {
                document.querySelector('[data-viz="rings"]').click();
            }
        });
    </script>
</body>
</html>
