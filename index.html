<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic — Color Music Visualizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bass: #ff0066;
            --mid: #00ffaa;
            --treble: #6600ff;
            --bg: #050508;
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }
        
        /* Canvas */
        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        
        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .start-title {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--bass), var(--mid), var(--treble));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShift 10s linear infinite;
            background-size: 300% 100%;
        }
        
        @keyframes titleShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        .start-subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.3em;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        
        #startBtn {
            padding: 18px 50px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        #startBtn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--mid);
            box-shadow: 0 0 30px rgba(0,255,170,0.3);
        }
        
        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #startBtn.error {
            border-color: var(--bass);
            color: var(--bass);
        }
        
        .start-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            max-width: 400px;
            text-align: center;
        }
        
        /* UI Elements */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .settings-btn.visible {
            opacity: 1;
        }
        
        .settings-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
        }
        
        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0; right: 0;
            width: min(400px, 90vw);
            height: 100%;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            z-index: 60;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 30px;
        }
        
        .settings-panel.open {
            transform: translateX(0);
        }
        
        .settings-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-btn {
            width: 40px;
            height: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .settings-section {
            margin-bottom: 30px;
        }
        
        .settings-section-title {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        
        .slider-control {
            margin-bottom: 20px;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .slider-value {
            color: var(--mid);
            font-weight: 600;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--mid), var(--treble));
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,170,0.5);
        }
        
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .theme-option {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .theme-option:hover {
            transform: scale(1.05);
        }
        
        .theme-option.active {
            border-color: #fff;
        }
        
        .toggle-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .toggle {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.1);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle.active {
            background: var(--mid);
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }
        
        .toggle.active::after {
            transform: translateX(24px);
        }
        
        .viz-btn {
            padding: 10px 20px;
            font-family: inherit;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.6);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .viz-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .viz-btn.active {
            background: rgba(0,255,170,0.2);
            border-color: var(--mid);
            color: var(--mid);
        }
        
        /* Info Bar */
        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .info-bar.visible {
            opacity: 1;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .info-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        
        .info-bar-fill {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .info-bar-fill-inner {
            height: 100%;
            border-radius: 2px;
            transition: width 0.05s;
        }
        
        .bass-fill { background: var(--bass); box-shadow: 0 0 10px var(--bass); }
        .mid-fill { background: var(--mid); box-shadow: 0 0 10px var(--mid); }
        .treble-fill { background: var(--treble); box-shadow: 0 0 10px var(--treble); }
        
        /* Viz Selector */
        .viz-selector {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .viz-selector.visible {
            opacity: 1;
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            .viz-selector {
                bottom: 160px;
            }
            .info-bar {
                bottom: 220px;
            }
        }
        
        /* Overlay */
        .overlay-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 55;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .overlay-backdrop.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            z-index: 50;
            opacity: 0;
        }
        
        .fps-counter.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="start-screen" id="startScreen">
        <h1 class="start-title">CHROMATIC</h1>
        <p class="start-subtitle">Color Music Visualizer</p>
        <button id="startBtn" onclick="handleMicClick()">Connect Microphone</button>
        <p class="start-note" id="startNote">Microphone access required for audio visualization</p>
    </div>
    
    <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()">⚙️</button>
    
    <div class="viz-selector" id="vizSelector">
        <button class="viz-btn active" onclick="setViz('particles')">Particles</button>
        <button class="viz-btn" onclick="setViz('waves')">Waves</button>
        <button class="viz-btn" onclick="setViz('rings')">Rings</button>
        <button class="viz-btn" onclick="setViz('terrain')">Terrain</button>
        <button class="viz-btn" onclick="setViz('fire')">Fire</button>
    </div>
    
    <div class="info-bar" id="infoBar">
        <div class="info-item">
            <span class="info-label">Bass</span>
            <div class="info-bar-fill"><div class="info-bar-fill-inner bass-fill" id="bassBar" style="width: 0%"></div></div>
        </div>
        <div class="info-item">
            <span class="info-label">Mid</span>
            <div class="info-bar-fill"><div class="info-bar-fill-inner mid-fill" id="midBar" style="width: 0%"></div></div>
        </div>
        <div class="info-item">
            <span class="info-label">Treble</span>
            <div class="info-bar-fill"><div class="info-bar-fill-inner treble-fill" id="trebleBar" style="width: 0%"></div></div>
        </div>
    </div>
    
    <div class="overlay-backdrop" id="overlayBackdrop" onclick="toggleSettings()"></div>
    
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">
            <span>Settings</span>
            <button class="close-btn" onclick="toggleSettings()">✕</button>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Audio</div>
            <div class="slider-control">
                <div class="slider-label">
                    <span>Sensitivity</span>
                    <span class="slider-value" id="sensitivityValue">100%</span>
                </div>
                <input type="range" id="sensitivity" min="50" max="300" value="100" oninput="updateSetting('sensitivity', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label">
                    <span>Smoothing</span>
                    <span class="slider-value" id="smoothingValue">70%</span>
                </div>
                <input type="range" id="smoothing" min="0" max="95" value="70" oninput="updateSetting('smoothing', this.value)">
            </div>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Visualizer</div>
            <div class="slider-control">
                <div class="slider-label">
                    <span>Size</span>
                    <span class="slider-value" id="particleSizeValue">100%</span>
                </div>
                <input type="range" id="particleSize" min="25" max="200" value="100" oninput="updateSetting('particleSize', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label">
                    <span>Speed</span>
                    <span class="slider-value" id="particleSpeedValue">100%</span>
                </div>
                <input type="range" id="particleSpeed" min="25" max="300" value="100" oninput="updateSetting('particleSpeed', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label">
                    <span>Trails</span>
                    <span class="slider-value" id="trailValue">15%</span>
                </div>
                <input type="range" id="trailLength" min="0" max="50" value="15" oninput="updateSetting('trailLength', this.value)">
            </div>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Themes</div>
            <div class="theme-grid" id="themeGrid"></div>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Options</div>
            <div class="toggle-control">
                <span>Mirror Mode</span>
                <div class="toggle" id="mirrorToggle" onclick="toggleOption('mirror')"></div>
            </div>
            <div class="toggle-control">
                <span>Show FPS</span>
                <div class="toggle" id="fpsToggle" onclick="toggleOption('fps')"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let sensitivity = 100;
        let smoothing = 0.7;
        let particleSize = 1;
        let particleSpeed = 1;
        let trailLength = 0.85;
        let mirrorMode = false;
        let showFps = false;
        let currentViz = 'particles';
        let currentTheme = 'cosmic';
        let particles = [];
        let lastBands = { bass: 0, mid: 0, treble: 0 };
        let isStarted = false;
        
        // Themes
        const themes = {
            cosmic: { bass: '#ff0066', mid: '#00ffaa', treble: '#6600ff' },
            fire: { bass: '#ff4400', mid: '#ff0066', treble: '#ffaa00' },
            ocean: { bass: '#0066ff', mid: '#00ffaa', treble: '#00aaff' },
            neon: { bass: '#ff00ff', mid: '#00ffff', treble: '#ff00aa' },
            gold: { bass: '#ffd700', mid: '#ff6600', treble: '#ff0066' },
            arctic: { bass: '#00aaff', mid: '#00ffaa', treble: '#ffffff' },
            aurora: { bass: '#00ff88', mid: '#88ff00', treble: '#ff00ff' },
            matrix: { bass: '#00ff00', mid: '#88ff00', treble: '#00ff88' },
            sunset: { bass: '#ff4400', mid: '#ff0066', treble: '#ffaa00' },
            vapor: { bass: '#ff00ff', mid: '#00ffff', treble: '#ff0066' }
        };
        
        // Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Mic click handler
        async function handleMicClick() {
            const btn = document.getElementById('startBtn');
            const note = document.getElementById('startNote');
            
            btn.textContent = 'Requesting...';
            btn.disabled = true;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                btn.textContent = 'Setting up...';
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = smoothing;
                
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // Hide start screen
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('settingsBtn').classList.add('visible');
                document.getElementById('vizSelector').classList.add('visible');
                document.getElementById('infoBar').classList.add('visible');
                
                isStarted = true;
                animate();
                
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Retry Connection';
                btn.classList.add('error');
                note.textContent = 'Error: ' + err.message + ' — Please allow microphone access and try again';
            }
        }
        
        // Build theme grid
        Object.entries(themes).forEach(([key, theme]) => {
            const div = document.createElement('div');
            div.className = 'theme-option' + (key === currentTheme ? ' active' : '');
            div.style.background = `linear-gradient(135deg, ${theme.bass}, ${theme.mid}, ${theme.treble})`;
            div.onclick = () => selectTheme(key);
            document.getElementById('themeGrid').appendChild(div);
        });
        
        function selectTheme(theme) {
            currentTheme = theme;
            const t = themes[theme];
            document.documentElement.style.setProperty('--bass', t.bass);
            document.documentElement.style.setProperty('--mid', t.mid);
            document.documentElement.style.setProperty('--treble', t.treble);
            document.querySelectorAll('.theme-option').forEach((el, i) => {
                el.classList.toggle('active', Object.keys(themes)[i] === theme);
            });
        }
        
        // Settings
        function updateSetting(name, value) {
            const displayValue = document.getElementById(name + 'Value');
            displayValue.textContent = value + '%';
            
            switch(name) {
                case 'sensitivity': sensitivity = parseInt(value); break;
                case 'smoothing': 
                    smoothing = parseInt(value) / 100;
                    if (analyser) analyser.smoothingTimeConstant = smoothing;
                    break;
                case 'particleSize': particleSize = parseInt(value) / 100; break;
                case 'particleSpeed': particleSpeed = parseInt(value) / 100; break;
                case 'trailLength': trailLength = 1 - (parseInt(value) / 100); break;
            }
        }
        
        function toggleOption(name) {
            const el = document.getElementById(name + 'Toggle');
            if (name === 'mirror') {
                mirrorMode = !mirrorMode;
                el.classList.toggle('active', mirrorMode);
            } else if (name === 'fps') {
                showFps = !showFps;
                el.classList.toggle('active', showFps);
                document.getElementById('fpsCounter').classList.toggle('visible', showFps);
            }
        }
        
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
            document.getElementById('overlayBackdrop').classList.toggle('visible');
        }
        
        function setViz(viz) {
            currentViz = viz;
            document.querySelectorAll('.viz-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === viz);
            });
        }
        
        // Audio analysis
        function getBands() {
            if (!analyser) return { bass: 0, mid: 0, treble: 0 };
            
            analyser.getByteFrequencyData(dataArray);
            const len = dataArray.length;
            const bassEnd = Math.floor(len * 0.1);
            const midEnd = Math.floor(len * 0.5);
            
            let bassSum = 0, midSum = 0, trebleSum = 0;
            for (let i = 0; i < bassEnd; i++) bassSum += dataArray[i];
            for (let i = bassEnd; i < midEnd; i++) midSum += dataArray[i];
            for (let i = midEnd; i < len; i++) trebleSum += dataArray[i];
            
            let bass = (bassSum / bassEnd / 255) * (sensitivity / 100);
            let mid = (midSum / (midEnd - bassEnd) / 255) * (sensitivity / 100);
            let treble = (trebleSum / (len - midEnd) / 255) * (sensitivity / 100);
            
            bass = lastBands.bass * smoothing + bass * (1 - smoothing);
            mid = lastBands.mid * smoothing + mid * (1 - smoothing);
            treble = lastBands.treble * smoothing + treble * (1 - smoothing);
            
            lastBands = { bass, mid, treble };
            return { bass, mid, treble };
        }
        
        // Visualizers
        function drawParticles(bands) {
            const t = themes[currentTheme];
            const count = Math.floor(bands.bass * 40);
            
            for (let i = 0; i < count; i++) {
                let x = Math.random() * canvas.width;
                const y = canvas.height / 2 + (Math.random() - 0.5) * canvas.height * 0.6;
                const color = Math.random() < 0.33 ? t.bass : Math.random() < 0.5 ? t.mid : t.treble;
                const size = (Math.random() * 3 + 1) * particleSize;
                const life = 1;
                
                ctx.globalAlpha = life;
                ctx.fillStyle = color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function drawWaves(bands) {
            const t = themes[currentTheme];
            const time = Date.now() * 0.001;
            
            // Bass
            ctx.beginPath();
            ctx.strokeStyle = t.bass;
            ctx.lineWidth = (2 + bands.bass * 8) * particleSize;
            ctx.shadowBlur = 20;
            ctx.shadowColor = t.bass;
            
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height * 0.35 + Math.sin(x * 0.008 + time * 2) * 60 * bands.bass + Math.sin(x * 0.015 + time * 3) * 30 * bands.mid;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Mid
            ctx.beginPath();
            ctx.strokeStyle = t.mid;
            ctx.lineWidth = (2 + bands.mid * 6) * particleSize;
            ctx.shadowColor = t.mid;
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height * 0.5 + Math.sin(x * 0.012 + time * 2.5) * 50 * bands.mid + Math.sin(x * 0.025 + time * 4) * 25 * bands.treble;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Treble
            ctx.beginPath();
            ctx.strokeStyle = t.treble;
            ctx.lineWidth = (1 + bands.treble * 4) * particleSize;
            ctx.shadowColor = t.treble;
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height * 0.65 + Math.sin(x * 0.02 + time * 3) * 40 * bands.treble + Math.sin(x * 0.04 + time * 5) * 15 * bands.bass;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        function drawRings(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.4;
            const bassRadius = maxRadius * 0.2 + bands.bass * maxRadius * 0.5;
            
            ctx.beginPath();
            ctx.strokeStyle = t.bass;
            ctx.lineWidth = (3 + bands.bass * 12) * particleSize;
            ctx.shadowBlur = 40;
            ctx.shadowColor = t.bass;
            ctx.arc(cx, cy, bassRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Sparkles
            ctx.globalAlpha = 1;
            for (let i = 0; i < Math.floor(bands.treble * 30); i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = bassRadius + Math.random() * maxRadius * 0.5;
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist;
                ctx.fillStyle = t.treble;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(x, y, 2 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function drawTerrain(bands) {
            const t = themes[currentTheme];
            const time = Date.now() * 0.001;
            
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            
            for (let x = 0; x < canvas.width; x++) {
                const y = canvas.height * 0.6 - (Math.sin(x * 0.01 + time * 2) * 50 * bands.bass + Math.sin(x * 0.02 + time * 3) * 30 * bands.mid + Math.sin(x * 0.005 + time) * 20);
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, canvas.height * 0.4, 0, canvas.height);
            gradient.addColorStop(0, t.treble);
            gradient.addColorStop(0.5, t.mid);
            gradient.addColorStop(1, t.bass);
            
            ctx.fillStyle = gradient;
            ctx.shadowBlur = 30;
            ctx.shadowColor = t.mid;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawFire(bands) {
            const t = themes[currentTheme];
            const fireHeight = canvas.height * 0.5 * (0.3 + bands.bass * 0.7);
            const time = Date.now() * 0.001;
            
            for (let x = 0; x < canvas.width; x += 3) {
                const flicker = Math.sin(x * 0.1 + time * 10) * 10;
                const height = fireHeight + Math.sin(x * 0.03 + time * 5) * 30 * bands.mid + flicker;
                
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - height);
                gradient.addColorStop(0, t.bass);
                gradient.addColorStop(0.5, t.mid);
                gradient.addColorStop(1, t.treble + '00');
                
                ctx.fillStyle = gradient;
                ctx.shadowBlur = 20;
                ctx.shadowColor = t.mid;
                ctx.fillRect(x, canvas.height - height, 3, height);
            }
            ctx.shadowBlur = 0;
        }
        
        // Main loop
        function animate() {
            if (!isStarted) return;
            requestAnimationFrame(animate);
            
            // FPS
            if (showFps) {
                const fpsEl = document.getElementById('fpsCounter') || { textContent: '' };
            }
            
            // Trail
            ctx.fillStyle = `rgba(5, 5, 8, ${trailLength})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (!analyser) return;
            
            const bands = getBands();
            
            // Update UI bars
            document.getElementById('bassBar').style.width = (bands.bass * 100) + '%';
            document.getElementById('midBar').style.width = (bands.mid * 100) + '%';
            document.getElementById('trebleBar').style.width = (bands.treble * 100) + '%';
            
            // Draw
            switch (currentViz) {
                case 'particles': drawParticles(bands); break;
                case 'waves': drawWaves(bands); break;
                case 'rings': drawRings(bands); break;
                case 'terrain': drawTerrain(bands); break;
                case 'fire': drawFire(bands); break;
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') toggleSettings();
            if (e.key === 's' || e.key === 'S') toggleSettings();
            if (e.key >= '1' && e.key <= '5') {
                const vizs = ['particles', 'waves', 'rings', 'terrain', 'fire'];
                setViz(vizs[parseInt(e.key) - 1]);
            }
        });
    </script>
</body>
</html>
